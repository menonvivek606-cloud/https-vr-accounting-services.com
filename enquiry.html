<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VR Accounting Services - Enquiry</title>

    <!-- Google reCAPTCHA -->
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 450px;
            margin: 40px auto;
            padding: 20px;
            background: #ffffff;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
        }

        input, textarea, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        textarea {
            resize: vertical;
            height: 100px;
        }

        button {
            background-color: #2c3e50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background-color: #1a252f;
        }

        .error {
            color: red;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>Enquiry Form</h2>

    <form id="enquiryForm" onsubmit="return validateForm()">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email Address" required>
        <input type="tel" id="phone" placeholder="Phone Number" required pattern="[0-9]{10}">
        <input type="text" id="subject" placeholder="Subject" required>
        <textarea id="enquiry" placeholder="Your Enquiry" required></textarea>

        <!-- reCAPTCHA -->
        <div class="g-recaptcha" data-sitekey="YOUR_SITE_KEY_HERE"></div>

        <div id="error"></div>

        <button type="submit">Submit</button>
    </form>
</div>

<script>
function validateForm() {
    const captchaResponse = grecaptcha.getResponse();
    const errorDiv = document.getElementById("error");

    if (captchaResponse.length === 0) {
        errorDiv.innerHTML = "Please complete the CAPTCHA verification.";
        return false;
    }

    errorDiv.innerHTML = "";
    return true;
}
</script>
<!-- modify this form HTML and place wherever you want your form -->
<form
  action="https://formspree.io/f/xqeneyol"
  method="POST"
>
  <label>
    Your email:
    <input type="email" name="mailus@vr-accounting-services.com">
  </label>
  <label>
    Your message:
    <textarea name="message"></textarea>
  </label>
  <!-- your other form fields go here -->
  <button type="submit">Send</button>
</form>
</body>
</html>
